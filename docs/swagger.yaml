info:
  contact: {}
  description: Analyze Rainbow Six Siege replay rounds using replay-tool.
  title: Replay Tool API
  version: "1.0"
paths:
  /replay:
    post:
      consumes:
      - multipart/form-data
      description: Upload a ZIP archive containing replay round files and analyze
        every non-directory entry.
      parameters:
      - description: Replay ZIP archive
        in: formData
        name: file
        required: true
        type: file
      - description: Empty player frames, entities, camera frames, library shots,
          and library ammo updates to reduce response size
        in: query
        name: trim
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/main.APIRound'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/main.APIError'
      summary: Analyze a replay archive
      tags:
      - replay
  /round:
    post:
      consumes:
      - multipart/form-data
      description: Upload a Rainbow Six Siege .rec file and return the full replay-tool
        analysis.
      parameters:
      - description: Replay round (.rec)
        in: formData
        name: file
        required: true
        type: file
      - description: Empty player frames, entities, camera frames, library shots,
          and library ammo updates to reduce response size
        in: query
        name: trim
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.FullOutput'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/main.APIError'
      summary: Analyze one replay round
      tags:
      - replay
  /test:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Test API availability
      tags:
      - health
schemes:
- http
swagger: "2.0"
