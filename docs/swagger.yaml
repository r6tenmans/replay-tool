basePath: /
definitions:
  analysis.BinaryMatchEvent:
    properties:
      attacker:
        type: string
      attackerTeam:
        description: 'Decoded fields (computed from raw enums + extra hashes):'
        type: integer
      extraEnumA:
        description: hash 0xEDB81094 — observed 0..4
        type: integer
      extraEnumB:
        description: hash 0x694D0B82 — observed 0..3
        type: integer
      extraEnumC:
        description: hash 0xC470472F — observed 2..5
        type: integer
      headshot:
        type: boolean
      headshotByte:
        description: hash 0x4EA45BC3 — corroborating HS flag
        type: integer
      hitZone:
        description: hash 0xA5F688E7 — body-part hit bucket (0/1/2/3/4)
        type: integer
      killDamage:
        description: hash 0xC9527BDD — damage of killing bullet / max-health (0..1)
        type: number
      killEnum1:
        description: hash 0x5BC4BC84 — Y11S1+ ONLY value 2 appears (39% of Y11 kills);
          pre-Y11 always 1. Likely a Y11-introduced kill-metadata flag
        type: integer
      killEnum2:
        description: hash 0x37BF3E90 — always 1 (event-type marker)
        type: integer
      killEnum3:
        description: 'hash 0xD13DA88D — DECODED: AttackerTeam+1'
        type: integer
      killEnum4:
        description: 'hash 0x3187B853 — DECODED: VictimTeam+1'
        type: integer
      killEnum5:
        description: hash 0x0B64ADA5 — always 0 across 402 kills (reserved)
        type: integer
      killFlag1:
        description: hash 0x8F0292B5 — always 0 across 402 kills (reserved)
        type: integer
      killRange:
        description: hash 0xFB9DBF08 — weapon-dependent range / falloff factor (0..1)
        type: number
      offset:
        type: integer
      roundTimeMs:
        description: 'PR #5 — 4 new kill TLVs decoded from the sub-stream:'
        type: integer
      substreamFlag:
        description: 'PR #4 — TLVs merged from duplicate sub-stream kill records:'
        type: integer
      target:
        type: string
      timeSecs:
        type: number
      type:
        description: '"kill", "death", "dbno"'
        type: string
      victimTeam:
        description: KillEnum4 - 1
        type: integer
      weaponEntRef64:
        description: |-
          Extended TLV properties from kill/DBNO records (Y9S2+, scanned in 256-byte window).
          Semantics verified across 402 kills from 85 replays spanning Y9S1 → Y11S1_Alpha03.
        type: integer
      weaponId:
        description: hash 0x65DD6CF8 — session-variable ID of killing weapon
        type: integer
    type: object
  analysis.BombPlantInfo:
    properties:
      planterIndex:
        type: integer
      timeSecs:
        type: number
      username:
        type: string
      x:
        type: number
      "y":
        type: number
      z:
        type: number
    type: object
  analysis.BombSiteInfo:
    properties:
      centerX:
        type: number
      centerY:
        type: number
      centerZ:
        type: number
      description:
        description: human-readable site label
        type: string
      floor:
        description: '"1F", "2F", "B", etc. (from spawn metadata)'
        type: string
    type: object
  analysis.DeathTimingEntry:
    properties:
      lastMovementSeq:
        type: integer
      lastMovementTimeSec:
        description: countdown seconds remaining (from game timer)
        type: number
      lastX:
        type: number
      lastY:
        type: number
      lastZ:
        type: number
      playerIndex:
        type: integer
    type: object
  analysis.DestructionEvent:
    properties:
      binOffset:
        type: integer
      entityHex:
        type: string
      entityId:
        type: integer
      entityType:
        description: '"drone", "barricade", "gadget", "projectile", "unknown"'
        type: string
      gadgetType:
        type: string
      timeSecs:
        type: number
    type: object
  analysis.DroneEventEntry:
    properties:
      connect:
        type: boolean
      droneRef:
        type: integer
      playerRef:
        type: integer
      seq:
        type: integer
      timeSecs:
        type: number
    type: object
  analysis.EntityTrack:
    properties:
      barricadeType:
        type: string
      entityHex:
        type: string
      entityId:
        type: integer
      frames:
        items:
          $ref: '#/definitions/analysis.PosFrame'
        type: array
      gadgetType:
        type: string
      healthEvents:
        items:
          $ref: '#/definitions/analysis.HealthEvent'
        type: array
      ownerDistance:
        description: distance (m) from owner at spawn — confidence indicator
        type: number
      ownerLabel:
        type: string
      ownerPlayerIndex:
        description: inferred owner for barricades / gadgets (nil if unknown — distinguishes
          "no owner" from playerIndex 0)
        type: integer
      projectileType:
        type: string
      spawnCounter:
        type: integer
      spawnGadgetName:
        description: specific gadget identified from SPAWN hash at +60/+64 (e.g. "Mute
          Jammer", "Frost Welcome Mat")
        type: string
      spawnHashA:
        description: 'raw hashA at +60 from SPAWN archetype (PR #7) — useful for downstream
          classification when SpawnGadgetName isn''t resolved'
        type: integer
      teamIndex:
        type: integer
      type:
        description: '"drone", "camera", "gadget", "projectile", "barricade", "weapon"'
        type: string
    type: object
  analysis.EquipmentSwitchEvent:
    properties:
      binOffset:
        type: integer
      fromWeaponId:
        type: integer
      isPrimaryNow:
        type: boolean
      playerIndex:
        type: integer
      timeSecs:
        type: number
      toWeaponId:
        type: integer
    type: object
  analysis.GadgetInventory:
    properties:
      entityRef:
        type: integer
      playerIndex:
        type: integer
      primaryCount:
        type: integer
      secondaryCount:
        type: integer
    type: object
  analysis.GameAction:
    properties:
      offset:
        type: integer
      timeSecs:
        type: number
      type:
        type: string
    type: object
  analysis.GameEvent:
    properties:
      headshot:
        type: boolean
      text:
        type: string
      timeSecs:
        type: number
      type:
        description: '"kill", "death", "dbno", "action_start", "round_end"'
        type: string
    type: object
  analysis.HealthEvent:
    properties:
      entityId:
        type: integer
      hp:
        type: integer
      offset:
        type: integer
      timeSecs:
        type: number
    type: object
  analysis.HealthUpdate:
    properties:
      binOffset:
        type: integer
      damageRate:
        description: hash 0x475BB68B
        type: number
      entityRef:
        description: non-zero for non-player entity health events
        type: integer
      health:
        type: number
      healthTime:
        description: hash 0x848F67CF
        type: number
      hitCounter:
        description: hash 0xF634093A — running damage taken
        type: number
      hitType:
        description: 'decoded from damageRate: "bullet" (0.133), "dot" (0.067), ""
          otherwise'
        type: string
      maxHealth:
        description: 'Co-located health sub-properties (extracted from 256-byte window
          around the hp hash):'
        type: number
      playerIndex:
        type: integer
      state:
        description: '"alive" (>=5), "dbno" (0<hp<5, bleeding-out fraction), "dead"
          (=0)'
        type: string
      timeSecs:
        type: number
    type: object
  analysis.HitEvent:
    properties:
      damage:
        description: damage from health drop, if available
        type: number
      headshot:
        description: matched a headshot kill
        type: boolean
      hitTimeSecs:
        type: number
      hpAfter:
        description: target HP after this hit
        type: number
      isDBNO:
        description: hit dropped HP into DBNO range
        type: boolean
      isKill:
        description: hit dropped HP to 0
        type: boolean
      shooterIndex:
        type: integer
      shotTimeSecs:
        type: number
      shotX:
        type: number
      shotY:
        type: number
      shotZ:
        type: number
      victimIndex:
        type: integer
    type: object
  analysis.LibraryAmmoUpdate:
    properties:
      available:
        type: integer
      binOffset:
        type: integer
      capacity:
        type: integer
      hash1:
        description: property hash (0x29C80A40 = "available", 0x3E6D5B6D = throwable
          count)
        type: integer
      hash2:
        description: slot identifier (see slotTypeFromHash2)
        type: integer
      playerIndex:
        type: integer
      timeSecs:
        type: number
    type: object
  analysis.LibraryCameraFrame:
    properties:
      binOffset:
        type: integer
      pitchDeg:
        type: number
      playerIndex:
        type: integer
      qw:
        type: number
      qx:
        type: number
      qy:
        type: number
      qz:
        type: number
      timeSecs:
        type: number
      yawDeg:
        type: number
    type: object
  analysis.LibraryGameAction:
    properties:
      binOffset:
        type: integer
      timeSecs:
        type: number
      type:
        type: string
    type: object
  analysis.LibraryShotEntry:
    properties:
      hqW:
        type: number
      hqX:
        type: number
      hqY:
        type: number
      hqZ:
        type: number
      pitch:
        type: number
      playerIndex:
        type: integer
      seq:
        type: integer
      timeSecs:
        type: number
      x:
        type: number
      "y":
        type: number
      yaw:
        type: number
      z:
        type: number
    type: object
  analysis.LoadoutItem:
    properties:
      auxHash:
        type: integer
      category:
        description: 10=weapon, 3=gadget, 22/24=operator
        type: integer
      gameId:
        type: integer
      maxCap:
        description: observed max capacity from ammo updates
        type: integer
      name:
        type: string
      shotCount:
        description: observed ammo decreases (=shots fired)
        type: integer
      slotType:
        description: 'Real data from AmmoUpdates (populated post-analysis when available):'
        type: string
      weaponRef:
        description: entity ref of the weapon instance
        type: integer
    type: object
  analysis.OperatorSwapEvent:
    properties:
      fromOperator:
        type: string
      offset:
        type: integer
      playerIndex:
        type: integer
      timeSecs:
        type: number
      toOperator:
        type: string
      username:
        type: string
    type: object
  analysis.PlayerLoadout:
    properties:
      operatorId:
        type: integer
      operatorName:
        type: string
      playerIndex:
        type: integer
      primaryGadget:
        allOf:
        - $ref: '#/definitions/analysis.LoadoutItem'
        description: |-
          PrimaryGadget is the operator's signature gadget (e.g., Bandit's SHOCK WIRE).
          Read from auxHash slot 0x1DA32C08 (slotOperatorGadget).
      primaryWeapon:
        $ref: '#/definitions/analysis.LoadoutItem'
      reinforcement:
        allOf:
        - $ref: '#/definitions/analysis.LoadoutItem'
        description: |-
          Reinforcement is the wall-reinforcement record for defenders (count is fixed by
          game rules at 2/player, not loadout choice). Read from auxHash slot 0x9B559835.
      secondaryGadget:
        allOf:
        - $ref: '#/definitions/analysis.LoadoutItem'
        description: |-
          SecondaryGadget is the universal throwable / utility (e.g., NITRO CELL, FRAG GRENADE).
          Read from auxHash slot 0xAFB455D8 (slotSecondaryGadget).
      secondaryWeapon:
        $ref: '#/definitions/analysis.LoadoutItem'
    type: object
  analysis.PlayerTrack:
    properties:
      entityId:
        type: integer
      frames:
        items:
          $ref: '#/definitions/analysis.PosFrame'
        type: array
      isAttacker:
        type: boolean
      killedAtSecs:
        type: number
      operator:
        type: string
      playerIndex:
        type: integer
      teamIndex:
        type: integer
      username:
        type: string
    type: object
  analysis.PlayerWeapons:
    properties:
      allWeapons:
        items:
          $ref: '#/definitions/analysis.WeaponAmmoInfo'
        type: array
      playerIndex:
        type: integer
      primary:
        $ref: '#/definitions/analysis.WeaponAmmoInfo'
      secondary:
        $ref: '#/definitions/analysis.WeaponAmmoInfo'
    type: object
  analysis.PosFrame:
    properties:
      coX:
        description: Bone data (chest)
        type: number
      coY:
        type: number
      coZ:
        type: number
      cqW:
        type: number
      cqX:
        type: number
      cqY:
        type: number
      cqZ:
        type: number
      entityId:
        type: integer
      headAimPitch:
        type: number
      headAimYaw:
        description: World-space head aim (body_quat × head_bone_quat)
        type: number
      hoX:
        description: Bone data (head)
        type: number
      hoY:
        type: number
      hoZ:
        type: number
      hqW:
        type: number
      hqX:
        type: number
      hqY:
        type: number
      hqZ:
        type: number
      isCamera:
        type: boolean
      offset:
        type: integer
      pitchDeg:
        type: number
      qw:
        type: number
      qx:
        type: number
      qy:
        type: number
      qz:
        type: number
      stance:
        description: '"standing", "crouching", "prone"'
        type: string
      timeSecs:
        type: number
      x:
        type: number
      "y":
        type: number
      yawDeg:
        type: number
      z:
        type: number
    type: object
  analysis.ReinforceEvent:
    properties:
      binOffset:
        type: integer
      playerIndex:
        type: integer
      timeSecs:
        type: number
      username:
        type: string
      x:
        type: number
      "y":
        type: number
      z:
        type: number
    type: object
  analysis.ReviveEvent:
    properties:
      binOffset:
        type: integer
      playerIndex:
        type: integer
      timeSecs:
        type: number
    type: object
  analysis.RoundAnalysis:
    properties:
      binaryFeedback:
        description: Kill/DBNO events parsed directly from binary
        items:
          $ref: '#/definitions/analysis.BinaryMatchEvent'
        type: array
      bombPlant:
        allOf:
        - $ref: '#/definitions/analysis.BombPlantInfo'
        description: Bomb plant location (XYZ where defuser was placed)
      bombSite:
        allOf:
        - $ref: '#/definitions/analysis.BombSiteInfo'
        description: Bomb site classification (A/B + side)
      cameraFrames:
        description: Camera look-direction frames from the dissect library
        items:
          $ref: '#/definitions/analysis.LibraryCameraFrame'
        type: array
      deathTimings:
        description: Last significant movement positions for players who died
        items:
          $ref: '#/definitions/analysis.DeathTimingEntry'
        type: array
      destructionEvents:
        description: Destruction events (drone/gadget/barricade HP reached zero)
        items:
          $ref: '#/definitions/analysis.DestructionEvent'
        type: array
      droneEvents:
        description: Drone connect/disconnect lifecycle events
        items:
          $ref: '#/definitions/analysis.DroneEventEntry'
        type: array
      entities:
        description: Non-player tracked entities (drones, cameras, gadgets, projectiles,
          barricades)
        items:
          $ref: '#/definitions/analysis.EntityTrack'
        type: array
      equipmentSwitches:
        description: Equipment switch events (player changed active weapon)
        items:
          $ref: '#/definitions/analysis.EquipmentSwitchEvent'
        type: array
      gadgetInventory:
        description: Per-player primary/secondary gadget counts from inventory records
          (last 40% of file)
        items:
          $ref: '#/definitions/analysis.GadgetInventory'
        type: array
      gameActions:
        description: Game actions (reinforce, gadget deploy) from binary scan
        items:
          $ref: '#/definitions/analysis.GameAction'
        type: array
      gameEvents:
        description: Timed game events for visualization
        items:
          $ref: '#/definitions/analysis.GameEvent'
        type: array
      healthUpdates:
        description: Health state changes per player
        items:
          $ref: '#/definitions/analysis.HealthUpdate'
        type: array
      hits:
        description: 'Hit events: shots correlated with target health drops'
        items:
          $ref: '#/definitions/analysis.HitEvent'
        type: array
      libraryAmmoUpdates:
        description: Raw ammo state updates from the dissect library
        items:
          $ref: '#/definitions/analysis.LibraryAmmoUpdate'
        type: array
      libraryGameActions:
        description: Game actions from the dissect library (more reliable for newer
          seasons)
        items:
          $ref: '#/definitions/analysis.LibraryGameAction'
        type: array
      libraryShots:
        description: Shot events reconstructed by the dissect library
        items:
          $ref: '#/definitions/analysis.LibraryShotEntry'
        type: array
      loadouts:
        description: Per-player equipment loadout (weapon + gadget names)
        items:
          $ref: '#/definitions/analysis.PlayerLoadout'
        type: array
      operatorSwaps:
        description: Mid-round attacker operator swap events
        items:
          $ref: '#/definitions/analysis.OperatorSwapEvent'
        type: array
      outcome:
        allOf:
        - $ref: '#/definitions/analysis.RoundOutcome'
        description: Round outcome (why the round ended)
      players:
        description: Player entities with full position/rotation history
        items:
          $ref: '#/definitions/analysis.PlayerTrack'
        type: array
      recordingPlayer:
        description: Recording player index
        type: integer
      reinforcements:
        description: Reinforcement deploy events with position
        items:
          $ref: '#/definitions/analysis.ReinforceEvent'
        type: array
      reviveEvents:
        description: Revive events (downed player brought back)
        items:
          $ref: '#/definitions/analysis.ReviveEvent'
        type: array
      roundDuration:
        description: Round duration in seconds
        type: number
      scoreUpdates:
        description: Player score delta events (points earned per action)
        items:
          $ref: '#/definitions/analysis.ScoreUpdateEvent'
        type: array
      shotDamages:
        description: Per-shot damage estimates (when shot correlates with health change)
        items:
          $ref: '#/definitions/analysis.ShotDamage'
        type: array
      shots:
        description: Reconstructed shot events (position + aim at moment of fire)
        items:
          $ref: '#/definitions/analysis.ShotEvent'
        type: array
      spectatorPeriods:
        description: Spectator POV periods (recording-player camera target)
        items:
          $ref: '#/definitions/analysis.SpectatorPeriod'
        type: array
      timerPhases:
        items:
          $ref: '#/definitions/analysis.TimerPhase'
        type: array
      timerTicks:
        description: Timer ticks and round phases
        items:
          $ref: '#/definitions/analysis.TimerTick'
        type: array
      trades:
        description: 'Trade kills: kill within trade-window of teammate''s death'
        items:
          $ref: '#/definitions/analysis.TradeKill'
        type: array
      weapons:
        additionalProperties:
          $ref: '#/definitions/analysis.PlayerWeapons'
        description: Per-player weapon/ammo tracking
        type: object
    type: object
  analysis.RoundOutcome:
    properties:
      attackersDead:
        type: integer
      defendersDead:
        type: integer
      defused:
        type: boolean
      planted:
        type: boolean
      winCondition:
        description: '"KilledOpponents", "DefusedBomb", "DisabledDefuser", "Time",
          "PlantDetonation"'
        type: string
      winningRole:
        description: '"Attack" or "Defense"'
        type: string
      winningTeam:
        description: 0 or 1, -1 if unknown
        type: integer
    type: object
  analysis.ScoreUpdateEvent:
    properties:
      binOffset:
        type: integer
      delta:
        type: integer
      newScore:
        type: integer
      playerIndex:
        type: integer
      prevScore:
        type: integer
      timeSecs:
        type: number
      username:
        type: string
    type: object
  analysis.ShotDamage:
    properties:
      damage:
        type: number
      isKill:
        type: boolean
      shooterIndex:
        type: integer
      shotTimeSecs:
        type: number
      victimIndex:
        type: integer
    type: object
  analysis.ShotEvent:
    properties:
      hqW:
        type: number
      hqX:
        type: number
      hqY:
        type: number
      hqZ:
        type: number
      pitchDeg:
        type: number
      playerIndex:
        type: integer
      seq:
        type: integer
      timeSecs:
        type: number
      x:
        type: number
      "y":
        type: number
      yawDeg:
        type: number
      z:
        type: number
    type: object
  analysis.SpectatorPeriod:
    properties:
      endSecs:
        type: number
      frameCount:
        type: integer
      startSecs:
        type: number
      targetIndex:
        type: integer
      username:
        type: string
    type: object
  analysis.TimerPhase:
    properties:
      duration:
        type: number
      endSec:
        type: number
      name:
        description: '"prep" or "action"'
        type: string
      startSec:
        type: number
    type: object
  analysis.TimerTick:
    properties:
      offset:
        type: integer
      seconds:
        type: number
    type: object
  analysis.TradeKill:
    properties:
      tradedForIndex:
        description: teammate who died
        type: integer
      tradedTimeSecs:
        type: number
      traderIndex:
        description: player who got the trade kill
        type: integer
      traderTimeSecs:
        type: number
      victimIndex:
        description: person the trader killed (also killed teammate)
        type: integer
      windowSecs:
        description: time between teammate death and trade kill
        type: number
    type: object
  analysis.WeaponAmmoInfo:
    properties:
      finalAmmo:
        type: integer
      initialAmmo:
        type: integer
      isPrimary:
        type: boolean
      magazineSize:
        type: integer
      playerIndex:
        type: integer
      shotsFired:
        type: integer
      totalEvents:
        type: integer
      weaponCategory:
        type: string
      weaponEid:
        type: integer
      weaponName:
        type: string
    type: object
  main.APIError:
    properties:
      context:
        type: string
      error:
        type: string
    type: object
  main.APIRound:
    properties:
      error:
        type: string
      fileName:
        type: string
      round:
        $ref: '#/definitions/main.FullOutput'
    type: object
  main.DefuserTickEntry:
    properties:
      prevValue:
        type: number
      rawValue:
        type: number
      state:
        type: string
      time:
        type: string
      timeSecs:
        type: number
    type: object
  main.FeedbackInfo:
    properties:
      dbnoBy:
        description: who downed the target (if different from finisher)
        type: string
      finishedBy:
        description: who finished the kill on a downed target
        type: string
      headshot:
        type: boolean
      target:
        type: string
      time:
        description: mm:ss countdown string
        type: string
      timeSecs:
        description: raw countdown seconds (TimeInSeconds)
        type: number
      type:
        type: string
      username:
        type: string
    type: object
  main.FullOutput:
    properties:
      analysis:
        $ref: '#/definitions/analysis.RoundAnalysis'
      defuserTicks:
        items:
          $ref: '#/definitions/main.DefuserTickEntry'
        type: array
      header:
        $ref: '#/definitions/main.HeaderInfo'
      libraryLoadouts:
        items:
          $ref: '#/definitions/main.LibraryLoadoutEntry'
        type: array
    type: object
  main.HeaderInfo:
    properties:
      gameMode:
        type: string
      gameVersion:
        type: string
      mapName:
        type: string
      matchFeedback:
        items:
          $ref: '#/definitions/main.FeedbackInfo'
        type: array
      matchId:
        type: string
      players:
        items:
          $ref: '#/definitions/main.PlayerInfoHeader'
        type: array
      roundNumber:
        type: integer
      scoreboard:
        items:
          $ref: '#/definitions/main.ScoreboardEntry'
        type: array
      teams:
        items:
          $ref: '#/definitions/main.TeamInfo'
        type: array
    type: object
  main.LibraryGadgetCounts:
    properties:
      hasPrimary:
        type: boolean
      hasSecondary:
        type: boolean
      primaryCount:
        type: integer
      secondaryCount:
        type: integer
    type: object
  main.LibraryLoadoutEntry:
    properties:
      gadgetLoadout:
        $ref: '#/definitions/main.LibraryGadgetCounts'
      playerIndex:
